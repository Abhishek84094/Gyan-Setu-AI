# Render Blueprint Specification for Gyan-Setu
services:
  # 1. Express Proxy Server (Backend Web Service)
  - type: web
    name: gyan-setu-backend
    runtime: node
    repo: https://github.com/Abhishek84094/Gyan-Setu-AI.git
    branch: main
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 5000
      - key: GEMINI_API_KEY
        sync: false # Securely prompt user during deployment
      - key: GROQ_API_KEY
        sync: false

  # 2. Vite React Application (Frontend Static Site)
  - type: web
    name: gyan-setu-frontend
    runtime: static
    repo: https://github.com/Abhishek84094/Gyan-Setu-AI.git
    branch: main
    buildCommand: npm run build
    publishDir: dist
    envVars:
      # Automatically fetch the deployed backend URL from the gyan-setu-backend service!
      - key: VITE_BACKEND_URL
        fromService:
          type: web
          name: gyan-setu-backend
          property: host
      # Prompt user for Supabase configurations
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
